{% load static %}

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Document</title>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
                <a class="nav-link active" aria-current="page" href="/articles/">Все статьи</a>
            </div>
        </div>
    </div>
</nav>
<div class="container">
    <div class="card my-5">
        <div class="card-header fs-4 text-center py-3">Создание статьи</div>
        <div class="card-body">
            <form id="article-form" action="" method="POST">
                {% csrf_token %}
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="title" name="title" placeholder="Заголовок">
                    <label for="title">Заголовок</label>
                </div>
                <div class="form-floating mb-3">
                    <textarea type="text" class="form-control" id="content" name="content" placeholder="Описание"
                              style="height: 100px"></textarea>
                    <label for="content">Описание</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="author" name="author" placeholder="Автор">
                    <label for="author">Автор</label>
                </div>
            </form>
        </div>
        <div class="card-footer text-end py-3">
            <button type="submit" form="article-form" class="btn btn-sm btn-primary">Сохранить</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
